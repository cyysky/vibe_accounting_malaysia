name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api-test:
    name: API tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API test image
        run: docker build -f apps/api/Dockerfile --target tester -t vibe-accounting-malaysia/api-test:ci .

      - name: Run API unit tests
        run: docker run --rm vibe-accounting-malaysia/api-test:ci

  api-build:
    name: API build
    runs-on: ubuntu-latest
    needs: api-test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build -f apps/api/Dockerfile -t vibe-accounting-malaysia/api:ci .

  web-build:
    name: Web build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build -f apps/web/Dockerfile -t vibe-accounting-malaysia/web:ci .

  smoke:
    name: End-to-end smoke
    runs-on: ubuntu-latest
    needs: [api-build, web-build]
    steps:
      - uses: actions/checkout@v4
      - name: Bring up stack
        run: |
          docker compose -f infra/docker-compose.yml up -d --build
          # Wait for nginx to be reachable
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/health; then break; fi
            sleep 2
          done
      - name: Run smoke test
        run: node scripts/smoke.mjs
      - name: Tear down
        if: always()
        run: docker compose -f infra/docker-compose.yml down -v || true
